
# .github/workflows/trial_expiry_notifier.yml

name: Régua de Comunicação - Aviso de Expiração de Trial

on:
  # Dispara o workflow todos os dias às 10:00 UTC (7:00 no Brasil)
  schedule:
    - cron: '0 10 * * *'
  
  # Permite disparar o workflow manualmente
  workflow_dispatch:

jobs:
  check-trial-expirations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar o script de verificação de expiração de trial
        env:
          # Mapeia as GitHub Secrets para variáveis de ambiente
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python backend/app/trial_expiry_notifier.py
