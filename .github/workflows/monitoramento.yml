
# .github/workflows/cpa_monitor.yml

name: Monitorização de CPA do AdsGuardian AI

on:
  # Dispara o workflow a cada 15 minutos
  schedule:
    - cron: '*/15 * * * *'
  
  # Permite disparar o workflow manualmente a partir da interface do GitHub
  workflow_dispatch:

jobs:
  monitor-cpa:
    runs-on: ubuntu-latest

    steps:
      # 1. Faz o checkout do código do repositório
      - name: Checkout do código
        uses: actions/checkout@v3

      # 2. Configura o ambiente Python
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Usar uma versão estável do Python

      # 3. Instala as dependências do projeto
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Executa o script de monitorização de CPA
      - name: Executar o script de monitorização
        env:
          # Mapeia as GitHub Secrets para variáveis de ambiente
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          AD_ACCOUNT_ID: ${{ secrets.AD_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python backend/app/cpa_monitor.py

# Este workflow executa o script de monitorização de CPA (CPA Guard) a cada 15 minutos.
